name: strategy-gate
on: [pull_request]

jobs:
  strategy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Simulate pre-commit scan vs main
        run: |
          # Single source of truth for trading-rule filename patterns.
          # Same file is read by pipeline/scripts/hooks/pre-commit-strategy-gate.sh.
          TRADING_PATTERNS=$(cat pipeline/scripts/hooks/strategy_patterns.txt)
          git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD > /tmp/new_files.txt
          NEW=$(grep -E "$TRADING_PATTERNS" /tmp/new_files.txt || true)
          if [[ -n "$NEW" ]]; then
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '(^|/)hypothesis-registry\.jsonl$'; then
              echo "ERROR: new strategy files without registry entry:"
              echo "$NEW"
              exit 1
            fi
          fi
