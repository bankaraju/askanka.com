<div class="analysis-card" data-engine="ta">
      <div class="analysis-card__header">
        <div class="analysis-card__id">
          <span class="analysis-card__engine">TA</span>
          <span class="analysis-card__ticker">ITC</span>
        </div>
        <div class="analysis-card__verdict">UNAVAILABLE</div>
        <div class="analysis-card__conviction analysis-card__conviction--walk-forward" style="color: var(--accent-gold);" title="">—</div>
      </div>
      <div class="analysis-card__body">
        <div class="analysis-card__empty">No TA model yet — awaiting fit run.</div>
        
        <div class="analysis-card__health">
          <span class="analysis-card__dot" style="background:var(--text-muted)"></span>
          <span>UNAVAILABLE</span>
          <span class="analysis-card__health-detail">daily bars, EOD cadence</span>
        </div>
      </div>
      <div class="analysis-card__footer">
        <span class="analysis-card__freshness">—</span>
        <span class="analysis-card__source"></span>
      </div>
    </div>
