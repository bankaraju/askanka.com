<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anka Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="/static/css/terminal.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__regime">
        <span id="regime-badge" class="topbar__regime-badge regime-neutral">LOADING</span>
        <span id="regime-stability" class="text-muted" style="font-size: 0.75rem;"></span>
      </div>
      <div class="topbar__market">
        <span id="market-status">--</span>
      </div>
      <div class="topbar__clock">
        <span id="clock">--:--:--</span>
        <span id="stale-indicator" style="display:none; margin-left: 8px;" class="badge badge--stale">STALE</span>
      </div>
    </header>
    <nav class="sidebar" role="navigation" aria-label="Primary">
      <div class="sidebar__brand">
        <h1>Anka</h1>
        <span>Terminal v0.1</span>
      </div>
      <div class="sidebar__nav">
        <button class="sidebar__item sidebar__item--active" data-tab="dashboard" aria-label="Dashboard">
          <i data-lucide="layout-dashboard"></i><span class="sidebar__label">Dashboard</span>
          <span class="sidebar__badge" data-badge-for="dashboard"></span>
          <span class="sidebar__dot" data-dot-for="dashboard" aria-hidden="true"></span>
        </button>
        <!-- Trading tab hidden 2026-04-27: mixed-meaning evidence buffet, no actions taken from it, no outcomes. Code retained at pages/trading.js + components/candidates-table.js — re-enable by uncommenting this block. -->
        <!--
        <button class="sidebar__item" data-tab="trading" aria-label="Trading">
          <i data-lucide="trending-up"></i><span>Trading</span>
        </button>
        -->
        <button class="sidebar__item" data-tab="live-monitor" aria-label="Live Monitor">
          <i data-lucide="radio"></i><span class="sidebar__label">Live</span>
          <span class="sidebar__badge" data-badge-for="live-monitor"></span>
          <span class="sidebar__dot" data-dot-for="live-monitor" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="regime" aria-label="Regime">
          <i data-lucide="activity"></i><span class="sidebar__label">Regime</span>
          <span class="sidebar__badge" data-badge-for="regime"></span>
          <span class="sidebar__dot" data-dot-for="regime" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="scanner" aria-label="Scanner">
          <i data-lucide="radar"></i><span class="sidebar__label">Scanner</span>
          <span class="sidebar__badge" data-badge-for="scanner"></span>
          <span class="sidebar__dot" data-dot-for="scanner" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="trust" aria-label="Trust Scores">
          <i data-lucide="shield-check"></i><span class="sidebar__label">Trust</span>
          <span class="sidebar__badge" data-badge-for="trust"></span>
          <span class="sidebar__dot" data-dot-for="trust" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="news" aria-label="News">
          <i data-lucide="newspaper"></i><span class="sidebar__label">News</span>
          <span class="sidebar__badge" data-badge-for="news"></span>
          <span class="sidebar__dot" data-dot-for="news" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="options" aria-label="Options">
          <i data-lucide="layers"></i><span class="sidebar__label">Options</span>
          <span class="sidebar__badge" data-badge-for="options"></span>
          <span class="sidebar__dot" data-dot-for="options" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="risk" aria-label="Risk">
          <i data-lucide="shield-alert"></i><span class="sidebar__label">Risk</span>
          <span class="sidebar__badge" data-badge-for="risk"></span>
          <span class="sidebar__dot" data-dot-for="risk" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="research" aria-label="Research">
          <i data-lucide="brain"></i><span class="sidebar__label">Research</span>
          <span class="sidebar__badge" data-badge-for="research"></span>
          <span class="sidebar__dot" data-dot-for="research" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="track-record" aria-label="Track Record">
          <i data-lucide="bar-chart-2"></i><span class="sidebar__label">Track Record</span>
          <span class="sidebar__badge" data-badge-for="track-record"></span>
          <span class="sidebar__dot" data-dot-for="track-record" aria-hidden="true"></span>
        </button>
        <button class="sidebar__item" data-tab="settings" aria-label="Settings">
          <i data-lucide="settings"></i><span class="sidebar__label">Settings</span>
        </button>
      </div>
    </nav>
    <main class="main" id="main-content" role="main"></main>
    <aside class="context-panel" id="context-panel" role="complementary" aria-label="Stock details">
      <div class="context-panel__header">
        <h3 id="context-panel-title">--</h3>
        <button class="context-panel__close" id="context-panel-close" aria-label="Close panel">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div id="context-panel-content"></div>
    </aside>
  </div>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
